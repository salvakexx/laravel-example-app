upstream backend {
    server php-fpm:9000;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;
    root /var/www/html/public;

    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    index index.php;

    # HTTPS (если нужен)
    # listen [::]:443 ssl http2;
    # include ssl_params.conf;

    # gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain application/json application/javascript text/css text/xml application/xml;
    gzip_disable "msie6";

    # Кэширование статических файлов
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|pdf|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Отключаем автоиндексацию .git директорий
    location ~ /\. {
        deny all;
    }

    # Laravel public assets
    location /favicon.ico {
        log_not_found off;
        access_log off;
    }

    location /robots.txt {
        log_not_found off;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    # PHP обработчик с оптимизацией для Laravel
    location ~ ^/index\.php(/|$) {
        fastcgi_pass backend;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # Время ожидания (для больших запросов)
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;

        # Кэширование FastCGI переменных
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # AJAX/JSON запросы - отдаем заголовки CORS
    location ~* \.(json|js)$ {
        add_header Access-Control-Allow-Origin *;
        add_header Access-Control-Allow-Methods 'GET, POST, OPTIONS';
        add_header Access-Control-Allow-Headers 'DNT,X-Mx-ReqToken,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization';
    }

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
}
